<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Dark fractured left half -->
  <clipPath id="left-clip">
    <rect x="0" y="0" width="60" height="120"/>
  </clipPath>
  <clipPath id="right-clip">
    <rect x="60" y="0" width="60" height="120"/>
  </clipPath>

  <!-- Background circle -->
  <circle cx="60" cy="58" r="50" fill="#1a2028"/>

  <!-- Left dark/fractured side -->
  <g clip-path="url(#left-clip)">
    <circle cx="60" cy="58" r="50" fill="#212121"/>
    <path d="M60 10 L35 30 L20 55 L28 80 L50 90 L60 85" fill="#2a3631" opacity="0.8"/>
    <path d="M60 15 L42 35 L30 58 L38 72 L55 82 L60 78" fill="#1e2d28" opacity="0.6"/>
    <!-- Fracture lines -->
    <path d="M60 20 L45 40 M55 35 L38 52 M50 50 L32 65 M52 65 L40 78" stroke="#536f68" stroke-width="0.8" opacity="0.5"/>
    <path d="M60 10 L48 28 L35 38 L28 52" stroke="#3a5048" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Right light/fluid side -->
  <g clip-path="url(#right-clip)">
    <circle cx="60" cy="58" r="50" fill="#1a2f28"/>
    <path d="M60 12 Q85 30 95 55 Q90 80 70 90 L60 85" fill="#2a4a3a" opacity="0.7"/>
    <!-- Fluid curves -->
    <path d="M60 18 Q78 35 82 58 Q78 80 65 90" stroke="#59a288" stroke-width="2.5" fill="none" opacity="0.6" stroke-linecap="round"/>
    <path d="M60 28 Q72 42 74 58 Q70 74 62 84" stroke="#59a288" stroke-width="1.8" fill="none" opacity="0.8" stroke-linecap="round"/>
    <path d="M60 38 Q68 48 68 58 Q66 68 61 76" stroke="#cad0cb" stroke-width="1.2" fill="none" opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- Glowing centre S circuit -->
  <circle cx="60" cy="58" r="16" fill="#212121" opacity="0.9"/>
  <circle cx="60" cy="58" r="16" fill="none" stroke="#59a288" stroke-width="0.8" opacity="0.6"/>
  <!-- Glow -->
  <circle cx="60" cy="58" r="12" fill="none" stroke="#59a288" stroke-width="3" opacity="0.15"/>

  <!-- S letterform -->
  <path d="M54 50 Q54 48 57 47 Q62 46 65 48.5 Q67 50.5 65.5 53 Q64 54.5 60 55.5 Q56 56.5 55 58.5 Q54 60.5 56 62.5 Q58 64.5 62 64.5 Q65 64.5 66 63"
        stroke="#cad0cb" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Circuit dots -->
  <circle cx="54" cy="50" r="1.2" fill="#59a288"/>
  <circle cx="66" cy="63" r="1.2" fill="#59a288"/>
  <path d="M52 50 L49 50 M52 53 L49 56 M68 63 L71 63 M68 60 L71 57" stroke="#59a288" stroke-width="0.8" opacity="0.7"/>
  <circle cx="49" cy="50" r="1" fill="#59a288" opacity="0.6"/>
  <circle cx="49" cy="56" r="1" fill="#59a288" opacity="0.6"/>
  <circle cx="71" cy="63" r="1" fill="#59a288" opacity="0.6"/>
  <circle cx="71" cy="57" r="1" fill="#59a288" opacity="0.6"/>
</svg>
